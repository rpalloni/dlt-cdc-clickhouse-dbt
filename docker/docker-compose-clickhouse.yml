# ClickHouse DWH
# CDC from PostgreSQL uses the MaterializedPostgreSQL database engine (experimental).
# pg_cdc database is created automatically via initdb.d/pg_cdc.sql on first container start.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    container_name: clickhouse-server
    ports:
      - "8123:8123"  # HTTP interface  (used by dlt, DBeaver, etc.)
      - "9000:9000"  # Native TCP      (used by clickhouse-client)
      - "9440:9440"  # Secure native
    environment:
      CLICKHOUSE_DB: events
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-dltuser}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dltpassword}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    depends_on:
      postgres-source:
        condition: service_healthy
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/initdb.d:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  data-network:
    external: true

volumes:
  clickhouse-data:
  clickhouse-logs: